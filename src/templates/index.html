<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Documentation Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; }
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            min-height: 120px;
        }
        textarea:focus { outline: none; border-color: #667eea; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 10px;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-record { background: #e53935; }
        .btn-record.recording { background: #c62828; animation: pulse 1s infinite; }
        .btn-stop { background: #455a64; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .recording-ui {
            text-align: center;
            padding: 30px;
            border: 3px dashed #e0e0e0;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .recording-ui.active { border-color: #e53935; background: #ffebee; }
        .waveform {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin: 20px 0;
        }
        .bar {
            width: 6px;
            background: #e53935;
            border-radius: 3px;
            animation: wave 0.5s ease-in-out infinite;
        }
        .bar:nth-child(1) { animation-delay: 0s; height: 20px; }
        .bar:nth-child(2) { animation-delay: 0.1s; height: 30px; }
        .bar:nth-child(3) { animation-delay: 0.2s; height: 40px; }
        .bar:nth-child(4) { animation-delay: 0.3s; height: 30px; }
        .bar:nth-child(5) { animation-delay: 0.4s; height: 20px; }

        @keyframes wave {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(1.5); }
        }

        .recording-ui:not(.active) .waveform { display: none; }
        .status { margin-top: 15px; font-size: 14px; color: #666; }
        .recording-ui.active .status { color: #e53935; font-weight: 600; }
        .transcript {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            max-height: 150px;
            overflow-y: auto;
            display: none;
        }
        .transcript.show { display: block; }
        .loading { text-align: center; padding: 40px; display: none; }
        .loading.show { display: block; }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error { background: #ffebee; color: #c62828; padding: 15px; border-radius: 8px; display: none; }
        .error.show { display: block; }
        .result { background: #f8f9fa; border-radius: 12px; padding: 20px; display: none; }
        .result.show { display: block; }
        .section { margin-bottom: 15px; }
        .section h4 { color: #667eea; margin-bottom: 8px; padding-bottom: 5px; border-bottom: 2px solid #667eea; }
        .section-content { background: white; padding: 12px; border-radius: 8px; border: 1px solid #e0e0e0; }
        .field { margin-bottom: 6px; }
        .field-label { font-weight: 600; color: #666; font-size: 13px; }
        @media (max-width: 600px) {
            .header h1 { font-size: 1.8rem; }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Clinical Documentation Assistant</h1>
            <p>Record voice or enter text to generate SOAP notes</p>
        </div>

        <div class="card">
            <div class="recording-ui" id="recordingUI">
                <h3 style="margin-bottom: 15px;">Voice Recording</h3>
                <div class="waveform">
                    <div class="bar"></div><div class="bar"></div>
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                </div>
                <p class="status" id="status">Click to start recording</p>
                <div style="margin-top: 20px;">
                    <button class="btn btn-record" id="recordBtn" onclick="toggleRecording()">🎤 Start Recording</button>
                    <button class="btn btn-stop" onclick="stopRecording()" style="display:none;" id="stopBtn">⏹ Stop</button>
                </div>
                <div class="transcript" id="transcript"></div>
            </div>
        </div>

        <div class="card">
            <label>Or Enter Encounter Text</label>
            <textarea id="encounter" placeholder="Patient presents with..."></textarea>
        </div>

        <button class="btn" onclick="generateSOAP()">Generate SOAP Note</button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing...</p>
        </div>
        <div class="error" id="error"></div>

        <div class="card result" id="result">
            <h3 style="margin-bottom: 20px;">SOAP Note</h3>
            <div class="section"><h4>Subjective (S)</h4><div class="section-content" id="subjective"></div></div>
            <div class="section"><h4>Objective (O)</h4><div class="section-content" id="objective"></div></div>
            <div class="section"><h4>Assessment (A)</h4><div class="section-content" id="assessment"></div></div>
            <div class="section"><h4>Plan (P)</h4><div class="section-content" id="plan"></div></div>
        </div>
    </div>

    <script>
        let mediaRecorder = null;
        let audioChunks = [];
        let recognition = null;
        let isRecording = false;
        let transcriptText = '';

        // Check for Web Speech API
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                let final = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        final += event.results[i][0].transcript;
                    }
                }
                if (final) {
                    transcriptText += ' ' + final;
                    updateTranscript();
                }
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                showError('Speech recognition error: ' + event.error);
                stopRecording();
            };

            recognition.onend = () => {
                if (isRecording) {
                    recognition.start();
                }
            };
        }

        function toggleRecording() {
            if (!recognition) {
                showError('Speech recognition not supported in this browser. Use Chrome or Edge.');
                return;
            }

            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        function startRecording() {
            try {
                recognition.start();
                isRecording = true;
                updateUI(true);
            } catch (e) {
                console.error(e);
            }
        }

        function stopRecording() {
            if (recognition) {
                recognition.stop();
            }
            isRecording = false;
            updateUI(false);
        }

        function updateUI(recording) {
            const recordBtn = document.getElementById('recordBtn');
            const stopBtn = document.getElementById('stopBtn');
            const recordingUI = document.getElementById('recordingUI');
            const status = document.getElementById('status');

            if (recording) {
                recordBtn.textContent = '⏹ Recording...';
                recordBtn.classList.add('recording');
                stopBtn.style.display = 'inline-block';
                recordingUI.classList.add('active');
                status.textContent = 'Listening... Speak now';
            } else {
                recordBtn.textContent = '🎤 Start Recording';
                recordBtn.classList.remove('recording');
                stopBtn.style.display = 'none';
                recordingUI.classList.remove('active');
                status.textContent = transcriptText ? 'Recording complete' : 'Click to start recording';
            }
        }

        function updateTranscript() {
            const el = document.getElementById('transcript');
            el.textContent = transcriptText.trim();
            el.classList.add('show');
            document.getElementById('encounter').value = transcriptText.trim();
        }

        async function generateSOAP() {
            const encounter = document.getElementById('encounter').value.trim();
            if (!encounter) {
                showError('Please record or enter patient encounter data');
                return;
            }

            showLoading(true);
            hideError();

            try {
                const response = await fetch(`${window.location.origin}/api/v1/demo-soap`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ encounter_text: encounter })
                });

                const data = await response.json();

                if (data.success) {
                    displayResult(data);
                } else {
                    showError(data.error || 'Failed to generate');
                }
            } catch (err) {
                showError('Connection error: ' + err.message);
            } finally {
                showLoading(false);
            }
        }

        function displayResult(data) {
            const soap = data.soap_note;
            document.getElementById('subjective').innerHTML = formatSection(soap.subjective);
            document.getElementById('objective').innerHTML = formatSection(soap.objective);
            document.getElementById('assessment').innerHTML = formatSection(soap.assessment);
            document.getElementById('plan').innerHTML = formatSection(soap.plan);
            document.getElementById('result').classList.add('show');
        }

        function formatSection(section) {
            if (!section) return '<p>No data</p>';
            let html = '';
            for (const [key, value] of Object.entries(section)) {
                if (value && value !== '') {
                    if (Array.isArray(value) && value.length > 0) {
                        html += `<div class="field"><span class="field-label">${formatKey(key)}:</span> ${value.join(', ')}</div>`;
                    } else if (typeof value === 'object') {
                        html += `<div class="field"><span class="field-label">${formatKey(key)}:</span> ${JSON.stringify(value)}</div>`;
                    } else if (typeof value === 'string' && value) {
                        html += `<div class="field"><span class="field-label">${formatKey(key)}:</span> ${value}</div>`;
                    }
                }
            }
            return html || '<p>No data</p>';
        }

        function formatKey(key) {
            return key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('show', show);
        }

        function showError(message) {
            const el = document.getElementById('error');
            el.textContent = message;
            el.classList.add('show');
        }

        function hideError() {
            document.getElementById('error').classList.remove('show');
        }
    </script>
</body>
</html>
